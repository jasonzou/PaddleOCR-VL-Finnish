### data
train_dataset_type: messages
eval_dataset_type: messages
train_dataset_path: ./data/dpo/train.jsonl
train_dataset_prob: "1.0"
eval_dataset_path: ./data/dpo/eval.jsonl
eval_dataset_prob: "1.0"
max_seq_len: 16384
padding_free: True
truncate_packing: False
dataloader_num_workers: 8
mix_strategy: concat
template_backend: custom
template: paddleocr_vl
#custom_register_path: ./vl_v15_template.py

### model
model_name_or_path: ../models/lorall3
_attn_implementation: flashmask
lora: true
lora_rank: 8
copy_custom_file_list: "configuration_paddleocr_vl.py image_processor_paddleocr_vl.py modeling_paddleocr_vl.py processing_paddleocr_vl.py inference.yml"

### finetuning
stage: VL-DPO
fine_tuning: lora
seed: 23
do_train: true
do_eval: true
per_device_eval_batch_size: 1
per_device_train_batch_size: 1
num_train_epochs: 1
max_steps: -1
eval_steps: 1000000
evaluation_strategy: steps
save_steps: 100
save_strategy: steps
logging_steps: 1
gradient_accumulation_steps: 4
logging_dir: ./dpo_logs
output_dir: ../models/lora-dpo
disable_tqdm: false
eval_accumulation_steps: 16

# train
lr_scheduler_type: cosine
warmup_ratio: 0.1
learning_rate: 3.0e-6
min_lr: 1.0e-6
loss_type: ipo
beta: 0.5

# optimizer
weight_decay: 0.1
adam_epsilon: 1.0e-8
adam_beta1: 0.9
adam_beta2: 0.95

# performance
tensor_model_parallel_size: 1
pipeline_model_parallel_size: 1
sharding: stage1
recompute_granularity: full
recompute_method: uniform
recompute_num_layers: 1
bf16: true
fp16_opt_level: O2

# checkpoint
unified_checkpoint: False
save_checkpoint_format: "flex_checkpoint"
load_checkpoint_format: "flex_checkpoint"
